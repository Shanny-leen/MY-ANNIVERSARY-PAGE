<!DOCTYPE html>
<html>
<head>
    <title>Happy Anniversary ❤️</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            text-align: center;
            background: linear-gradient(to right, #ff6a88, #ff99ac);
            color: white;
            overflow-x: hidden;
        }
        h1 { margin-top: 30px; }
        #letter { width: 80%; margin:auto; font-size:20px; min-height:120px; margin-top:20px; }
        button { padding:10px 20px; font-size:18px; border:none; border-radius:10px; cursor:pointer; margin:10px;}
        #giftBtn, #reasonBtn { background:white; color:#ff4b5c; }
        #giftMessage, #reasons { font-size:22px; margin-top:20px; }
        .photo img { width:200px; height:200px; border-radius:50%; border:5px solid white; box-shadow:0 0 20px white;}
        #no { position:absolute; background:#ff4b5c; color:white; }
        .heart { position:absolute; animation:float 6s linear infinite; }
        @keyframes float { from {transform:translateY(100vh);opacity:1;} to{transform:translateY(-10vh);opacity:0;} }
        #musicContainer { margin-top:15px; }
    </style>
</head>
<body>

<h1>Happy Anniversary My Love ❤️</h1>

<div class="photo">
    <!-- Replace with your direct Imgur link -->
    <img src="us.jpeg" alt="Us ❤️">
</div>

<div id="letter"></div>
<button onclick="startLetter()">Read this… 💌</button>

<br>

<button id="giftBtn" onclick="showGift()">Open Your Gift 🎁</button>
<div id="giftMessage" style="display:none;">
    You are my favorite person, my peace, my happiness... my everything ❤️<br><br>
    And my gift to you… is me. Forever 😌💖
</div>

<h2>Wanna know why I love you? 😏💖</h2>
<button id="reasonBtn" onclick="showReason()">Tell me 🥺</button>
<p id="reasons"></p>

<h2>Do you love me? 😏</h2>
<button onclick="alert('I knew it 😌❤️')">Yes 💖</button>
<button id="no">No 😅</button>

<!-- SoundCloud embed for "All Me" by Kehlani below Yes/No -->
<div id="musicContainer">
    <iframe width="100%" height="166" scrolling="no" frameborder="no"
      src="https://w.soundcloud.com/player/?url=https%3A//soundcloud.com/kehlanimusic/all-me-feat-keyshia-cole&color=%23ff5500&auto_play=false&hide_related=false&show_comments=true&show_user=true&show_reposts=false">
    </iframe>
</div>

<script>
const text = "Happy Anniversary my love 😭❤️\n\nFrom the moment you came into my life... everything changed 🥺\nYou are my safe place, my happiness, my peace 💖\nEvery moment with you means everything to me...\nEven on my worst days, you're still my favorite person 😭❤️\nAnd if I had to choose again... I would still choose you. Every time ❤️\nListen closely… this is how you make me feel 🎶💘";
let i = 0;

function startLetter(){
    document.getElementById("letter").innerHTML = "";
    i = 0;
    typeWriter();
}

function typeWriter(){
    if(i < text.length){
        document.getElementById("letter").innerHTML += text.charAt(i);
        i++;
        setTimeout(typeWriter, 40);
    }
}

function showGift(){
    document.getElementById("giftMessage").style.display = "block";
}

const reasonsList = [
    "You make me feel safe and loved🥺",
    "Your smile fixes everything my laawdd😭❤️",
    "You care about me so deeply 💖",
    "You’re my peace and comfort😌",
    "You make life feel special like dayuumm✨",
    "You understand me and tolerate me🥺",
    "You’re stuck with me forever bishhh😏❤️"
];

function showReason(){
    document.getElementById("reasons").innerHTML = "💖 " + reasonsList.join("<br>💖 ");
}

// Moving No button
const noBtn = document.getElementById("no");
noBtn.addEventListener("mouseover", function(){
    const x = Math.random() * window.innerWidth;
    const y = Math.random() * window.innerHeight;
    noBtn.style.left = x + "px";
    noBtn.style.top = y + "px";
});

// Floating hearts
function createHeart(){
    const heart = document.createElement("div");
    heart.classList.add("heart");
    heart.innerHTML = "❤️";
    heart.style.left = Math.random() * window.innerWidth + "px";
    heart.style.fontSize = (Math.random() * 20 + 10) + "px";
    document.body.appendChild(heart);
    setTimeout(() => heart.remove(), 6000);
}
setInterval(createHeart, 300);
</script>

</body>
</html>
